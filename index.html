  <!-- GitHub Pages SPA redirect handler: restores URL from ?p= query param -->
  <script>
    (function() {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
      // Handle the ?p= param set by 404.html
      var search = location.search;
      if (search) {
        var match = search.match(/[?&]p=([^&]+)/);
        if (match) {
          var path = decodeURIComponent(match[1].replace(/~and~/g, '&'));
          var qmatch = search.match(/[?&]q=([^&]+)/);
          var query = qmatch ? '?' + decodeURIComponent(qmatch[1].replace(/~and~/g, '&')) : '';
          var basePath = location.pathname.replace(/\/+$/, '');
          history.replaceState(null, null,
            basePath + (path.charAt(0) === '/' ? '' : '/') + path + query + location.hash
          );
        }
      }
    })();
  </script>
